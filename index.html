<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>BI TOEFL ITP — Mastertest</title>
<style>
:root {
    --bg: #0e0e26;
    --bg2: #16163a;
    --card: #1d1d4a;
    --border: #2a2a5e;
    --text: #ececff;
    --muted: #8a8ab8;
    --accent: #9999ff;
    --accent2: #c0c0ff;
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.12);
    --yellow: #f2ee5c;
    --yellow-bg: rgba(242,238,92,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.12);
    --gold-bg: rgba(153,153,255,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; overflow:hidden; height:100vh; }

.app { display:flex; height:100vh; }

.sidebar {
    width:230px; min-width:230px; background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:20px 0; overflow-y:auto;
}
.sidebar-logo { padding:0 20px 20px; border-bottom:1px solid var(--border); margin-bottom:12px; text-align:center; }
.sidebar-logo .logo-img { width:140px; height:140px; max-width:100%; border-radius:12px; margin:0 auto 10px; display:block; background:#9999ff; object-fit:contain; padding:8px; box-shadow:0 4px 20px rgba(153,153,255,0.25); }
.sidebar-logo h1 { font-size:16px; font-weight:700; letter-spacing:.5px; }
.sidebar-logo h1 span { color:var(--accent); }
.sidebar-logo .sub { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:.3px; }

.nav-section-title { padding:14px 20px 6px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; }

.nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 20px; cursor:pointer;
    color:var(--muted); font-size:13px; font-weight:500; transition:all .15s; border-left:3px solid transparent;
    user-select:none;
}
.nav-item:hover { color:var(--text); background:var(--gold-bg); }
.nav-item.active { color:var(--accent2); background:var(--gold-bg); border-left-color:var(--accent); }
.nav-item .icon { font-size:14px; width:18px; text-align:center; }
.nav-sub { padding-left:30px; font-size:12px; }
.nav-sub.active { color:var(--accent2); }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.header {
    display:flex; align-items:center; justify-content:space-between; padding:12px 24px;
    background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; gap:12px;
}
.header-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.header-left input[type="date"] {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:5px 10px; font-size:12px;
}
.header-left input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1); }
.header-right { display:flex; align-items:center; gap:8px; }
.hbtn {
    padding:5px 12px; border-radius:14px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-size:11px; cursor:pointer; transition:all .15s;
}
.hbtn:hover { border-color:var(--accent); color:var(--text); }
.hbtn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.sync-info { font-size:11px; color:var(--muted); }

.content { flex:1; overflow-y:auto; padding:24px; }

.section-title {
    font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px;
    padding-bottom:12px; border-bottom:1px solid var(--border);
}
.section-title .badge { font-size:10px; padding:3px 10px; border-radius:12px; background:var(--gold-bg); color:var(--accent); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }

.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:12px; margin-bottom:24px; }
.kpi {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px;
}
.kpi .label { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.6px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.kpi .value { font-size:22px; font-weight:700; line-height:1.2; }
.kpi .value.gold { color:var(--accent2); }
.kpi .sub { font-size:11px; color:var(--muted); margin-top:4px; }

.panel {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:20px; margin-bottom:16px;
}
.panel-title { font-size:14px; font-weight:600; margin-bottom:14px; color:var(--accent2); display:flex; align-items:center; gap:8px; }

table { width:100%; border-collapse:collapse; font-size:12px; }
th {
    text-align:left; padding:8px 10px; color:var(--muted); font-size:10px; text-transform:uppercase;
    letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; font-weight:600;
}
td { padding:8px 10px; border-bottom:1px solid rgba(44,38,32,0.5); vertical-align:middle; white-space:nowrap; }
tr:hover { background:var(--gold-bg); }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.nome-cell { max-width:340px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.complement { color:var(--muted); font-size:11px; }
.status-active { color:var(--green); font-weight:600; }
.status-paused { color:var(--yellow); }
.status-archived { color:var(--muted); }

.funil-vertical { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
.funil-row { display:flex; align-items:center; gap:14px; }
.funil-row-info { width:160px; flex-shrink:0; }
.funil-step-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.funil-step-conv { font-size:10px; color:var(--accent); margin-top:2px; }
.funil-step-conv.zero { color:var(--red); }
.funil-bar-wrap { flex:1; display:flex; justify-content:center; align-items:center; height:38px; }
.funil-bar-h {
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    height:100%; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    color:#000; font-weight:700; font-size:13px;
    transition:width .4s ease; min-width:30px;
    box-shadow: 0 2px 8px rgba(201,169,97,0.2);
}
.funil-bar-h .vlbl { padding:0 12px; white-space:nowrap; }

.empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }

.chip {
    display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600;
    background:var(--gold-bg); color:var(--accent2); margin-right:4px;
}
.chip.vendas { background:var(--green-bg); color:var(--green); }
.chip.leads { background:var(--blue-bg); color:var(--blue); }

/* Modal Criativo */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; display:none; justify-content:center; align-items:center; backdrop-filter:blur(4px); }
.modal-overlay.show { display:flex; }
.modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; width:560px; max-width:92vw; max-height:90vh; overflow-y:auto; padding:24px; position:relative; animation:modalIn .2s ease; }
@keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
.modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.modal-header { display:flex; gap:16px; align-items:flex-start; margin-bottom:20px; }
.modal-thumb { width:96px; height:96px; border-radius:10px; object-fit:cover; background:var(--bg2); flex-shrink:0; }
.modal-info { flex:1; min-width:0; }
.modal-title { font-size:15px; font-weight:700; margin-bottom:8px; word-break:break-word; }
.modal-tags { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.modal-tag { padding:3px 10px; border-radius:12px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
.modal-tag.video { background:var(--blue-bg); color:var(--blue); }
.modal-tag.image { background:rgba(168,85,247,0.15); color:#c084fc; }
.modal-tag.ativo { background:var(--green-bg); color:var(--green); }
.modal-tag.pausado { background:var(--yellow-bg); color:var(--yellow); }
.modal-ig-btn { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:14px; background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; font-size:10px; font-weight:600; text-decoration:none; text-transform:uppercase; letter-spacing:.3px; }
.modal-ig-btn:hover { opacity:.85; }
.modal-kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.modal-kpi { background:var(--bg2); border-radius:10px; padding:12px; text-align:center; }
.modal-kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.modal-kpi-value { font-size:18px; font-weight:700; color:var(--accent2); }
.modal-section-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:12px; }
.retention-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.retention-label { width:40px; font-size:12px; color:var(--muted); text-align:right; }
.retention-bar-bg { flex:1; height:14px; background:var(--bg); border-radius:7px; overflow:hidden; }
.retention-bar { height:100%; border-radius:7px; background:var(--blue); min-width:2px; transition:width .3s; }
.retention-value { width:110px; font-size:11px; color:var(--text); }
.row-clickable { cursor:pointer; }
.row-clickable:hover { background:var(--gold-bg); }

.status-filter-bar { display:flex; gap:6px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.status-filter-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.status-filter-count { font-size:11px; color:var(--muted); margin-left:8px; }
</style>
</head>

// === HELPERS ===
function fmtBRL(v) { return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtNum(v) { return (v||0).toLocaleString('pt-BR'); }
function fmtNumShort(v) { v=v||0; if(v>=1000000)return (v/1000000).toFixed(1)+'M'; if(v>=1000)return (v/1000).toFixed(1)+'K'; return v.toString(); }
function fmtPct(v) { return (v||0).toFixed(2) + '%'; }
function safeDiv(a, b) { return b > 0 ? a/b : 0; }

function statusLabel(s) {
    if (s === 'ACTIVE') return '<span class="status-active">Ativa</span>';
    if (s === 'PAUSED') return '<span class="status-paused">Pausada</span>';
    if (s === 'CAMPAIGN_PAUSED') return '<span class="status-paused">Campanha pausada</span>';
    if (s === 'ADSET_PAUSED') return '<span class="status-paused">Adset pausado</span>';
    if (s === 'ARCHIVED' || s === 'DELETED') return '<span class="status-archived">Arquivada</span>';
    return '<span class="complement">' + s + '</span>';
}
function isActive(s) { return s === 'ACTIVE'; }
function isPaused(s) { return s && s.indexOf('PAUSED') >= 0; }

function getDateRange() {
    return { since: document.getElementById('date-start').value, until: document.getElementById('date-end').value };
}
function inRange(date, range) { return date >= range.since && date <= range.until; }
function filterDaily(rows) {
    var r = getDateRange();
    return rows.filter(d => inRange(d.date, r));
}
function aggDaily(rows) {
    var s = {spend:0,impressions:0,clicks:0,reach:0,link_clicks:0,lp_views:0,leads:0,purchases:0};
    rows.forEach(d => {
        s.spend+=d.spend; s.impressions+=d.impressions; s.clicks+=d.clicks; s.reach+=d.reach;
        s.link_clicks+=d.link_clicks; s.lp_views+=d.lp_views; s.leads+=d.leads; s.purchases+=d.purchases;
    });
    s.ctr = safeDiv(s.clicks, s.impressions) * 100;
    s.cpc = safeDiv(s.spend, s.clicks);
    s.cpm = safeDiv(s.spend, s.impressions) * 1000;
    s.cpl = safeDiv(s.spend, s.leads);
    s.cpa = safeDiv(s.spend, s.purchases);
    return s;
}

            cost_per_engagement: agg.post_engagement > 0 ? agg.spend / agg.post_engagement : 0,
            cost_per_follow: agg.follows > 0 ? agg.spend / agg.follows : 0,
            cost_per_visit: agg.profile_visits > 0 ? agg.spend / agg.profile_visits : 0
        }));
    });
    return result;
}

// ADS_DAILY = [aid, date, spend, imp, clicks, lpv, leads, purchases, vv]
function aggregateAds() {
    var range = getDateRange();
    var byId = {};
    ADS_DAILY.forEach(row => {
        var aid = row[0], date = row[1];
        if (!inRange(date, range)) return;
        if (!byId[aid]) byId[aid] = {spend:0,impressions:0,clicks:0,lpv:0,leads:0,purchases:0,vv:0};
        byId[aid].spend += row[2];
        byId[aid].impressions += row[3];
        byId[aid].clicks += row[4];
        byId[aid].lpv += row[5];
        byId[aid].leads += row[6];
        byId[aid].purchases += row[7];
        byId[aid].vv += row[8];
    });
    var result = [];
    var campMap = {};
    CAMPAIGNS_META.forEach(c => { campMap[c.id] = c; });
    ADS_META.forEach(a => {
        var agg = byId[a.id];
        if (!agg || agg.spend === 0) return;
        var vid = ADS_VIDEO_TOTALS[a.id] || {};
        var camp = campMap[a.campaign_id] || {};
        result.push(Object.assign({}, a, agg, {
            ctr: safeDiv(agg.clicks, agg.impressions) * 100,
            cpc: safeDiv(agg.spend, agg.clicks),
            hook_rate: safeDiv(agg.vv, agg.impressions) * 100,
            is_video: agg.vv > 0,
            p25: vid.p25 || 0, p50: vid.p50 || 0, p75: vid.p75 || 0, p100: vid.p100 || 0,
            bloco: camp.bloco || 'Outros',
            produto: camp.produto || 'Outros'
        }));
    });
    return result;
}

// === FILTRO STATUS + ORDENACAO ===
function applyStatusFilter(items) {
    var filtered;
    if (STATUS_FILTER === 'active') filtered = items.filter(x => isActive(x.status));
    else if (STATUS_FILTER === 'paused') filtered = items.filter(x => isPaused(x.status));
    else filtered = items.slice();
    filtered.sort((a, b) => {
        var aa = isActive(a.status) ? 0 : 1;
        var bb = isActive(b.status) ? 0 : 1;
        if (aa !== bb) return aa - bb;
        return b.spend - a.spend;
    });
    return filtered;
}

function filterByBloco(camps, filter) {
    if (filter === 'all') return camps;
    if (filter === 'vendas') return camps.filter(c => c.bloco === 'Vendas');
    if (filter === 'leads') return camps.filter(c => c.bloco === 'Leads');
    if (filter === 'engajamento') return camps.filter(c => c.bloco === 'Engajamento' || c.bloco === 'Trafego');
    // filtro composto: {produto, bloco}
    if (typeof filter === 'object' && filter) {
        return camps.filter(c =>
            (!filter.produto || c.produto === filter.produto) &&
            (!filter.bloco || c.bloco === filter.bloco)
        );
    }
    return camps.filter(c => c.produto === filter);
}

function isPurchaseResult(c) {
    return c.result_action_type && c.result_action_type.indexOf('purchase') >= 0;
}

function aggSum(items) {
    var s = {spend:0,impressions:0,clicks:0,lpv:0,lp_views:0,leads:0,purchases:0,reach:0,link_clicks:0,result_count:0};
    items.forEach(c => {
        s.spend+=c.spend; s.impressions+=c.impressions; s.clicks+=c.clicks;
        s.lpv+=(c.lpv||0); s.lp_views+=(c.lpv||0);
        s.leads+=c.leads; s.purchases+=c.purchases;
        if (!isPurchaseResult(c)) s.result_count += (c.result_count || 0);
    });
    s.ctr = safeDiv(s.clicks, s.impressions) * 100;
    s.cpc = safeDiv(s.spend, s.clicks);
    s.cpm = safeDiv(s.spend, s.impressions) * 1000;
    s.cpl = safeDiv(s.spend, s.leads);
    s.cpa = safeDiv(s.spend, s.purchases);
    s.cpr = safeDiv(s.spend, s.result_count);
    return s;
}

}

function renderKPIs(agg, opts) {

    html += '<div class="kpi"><div class="label">👁️ Impressões</div><div class="value">' + fmtNumShort(agg.impressions) + '</div><div class="sub">CPM ' + fmtBRL(agg.cpm) + '</div></div>';

    html += '<div class="kpi"><div class="label">📄 LP Views</div><div class="value">' + fmtNumShort(agg.lp_views || agg.lpv || 0) + '</div><div class="sub">' + fmtPct(safeDiv(agg.lp_views || agg.lpv || 0, agg.clicks) * 100) + ' dos cliques</div></div>';

function renderFunil(agg, primary) {
    var steps;
    var resultLbl = 'Resultado';
    var resultVal = agg.result_count || 0;
    // Quando primary leads, mostra Resultado (que e o que importa)
    // Quando primary vendas, mostra Vendas
    // Quando both, mostra ambos no fim
    if (primary === 'leads')
        steps = [
            {lbl:'Impressões', val:agg.impressions},
            {lbl:'Cliques', val:agg.clicks},
            {lbl:'LP Views', val:agg.lp_views||agg.lpv},
            {lbl:resultLbl, val:resultVal || agg.leads}
        ];
    else if (primary === 'vendas')
        steps = [
            {lbl:'Impressões', val:agg.impressions},
            {lbl:'Cliques', val:agg.clicks},
            {lbl:'LP Views', val:agg.lp_views||agg.lpv},
            {lbl:'Vendas', val:agg.purchases}
        ];
    else
        steps = [
            {lbl:'Impressões', val:agg.impressions},
            {lbl:'Cliques', val:agg.clicks},
            {lbl:'LP Views', val:agg.lp_views||agg.lpv},
            {lbl:resultLbl, val:resultVal || agg.leads},
            {lbl:'Vendas', val:agg.purchases}
        ];

    var topVal = steps[0].val || 1;
    var html = '<div class="panel"><div class="panel-title">🔻 Funil</div><div class="funil-vertical">';
    steps.forEach(function(s, i) {
        // Escala suavizada (potencia 0.4) pra ficar harmonico mesmo com valores muito disparates.
        // Os numeros e taxas ao lado mantem a verdade analitica.
        var ratio = s.val / topVal;
        var widthPct = Math.max(Math.pow(ratio, 0.4) * 100, 18);
        var convHtml = '';
        if (i > 0) {
            var prev = steps[i-1].val;
            if (prev > 0) {
                var rate = (s.val / prev) * 100;
                var cls = rate < 1 ? 'zero' : '';
                convHtml = '<div class="funil-step-conv ' + cls + '">↓ ' + rate.toFixed(rate < 10 ? 2 : 1) + '% do anterior</div>';
            }
        }
        html += '<div class="funil-row">';
        html += '<div class="funil-row-info">';
        html += '<div class="funil-step-lbl">' + s.lbl + '</div>';
        html += convHtml;
        html += '</div>';
        html += '<div class="funil-bar-wrap">';
        html += '<div class="funil-bar-h" style="width:' + widthPct + '%"><span class="vlbl">' + fmtNumShort(s.val) + '</span></div>';
        html += '</div>';
        html += '</div>';
    });
    html += '</div></div>';
    return html;
}

            { lbl: '50%', val: a.p50 },
            { lbl: '75%', val: a.p75 },
            { lbl: '100%', val: a.p100 }
        ];
        var base = a.vv || a.p25 || 1;
        var html = '<div class="modal-section-title">Retenção de Vídeo</div>';
        stages.forEach(function(s) {
            var pct = Math.min(100, (s.val / base) * 100);
            html += '<div class="retention-row">';
            html += '<div class="retention-label">' + s.lbl + '</div>';
            html += '<div class="retention-bar-bg"><div class="retention-bar" style="width:' + pct + '%"></div></div>';
            html += '<div class="retention-value">' + fmtNum(s.val) + ' (' + pct.toFixed(0) + '%)</div>';
            html += '</div>';
        });
        retEl.innerHTML = html;
    } else {
        retEl.innerHTML = '';
    }

    document.getElementById('modal-criativo').classList.add('show');
}

function renderFollowerChart(daily) {
    if (!daily || daily.length < 2) return '';
    var W = 900, H = 220, P = 40;
    var vals = daily.map(d => d.followers).filter(v => v > 0);
    if (vals.length < 2) return '<div class="empty">Sem dados suficientes para o gráfico.</div>';
    var minV = Math.min.apply(null, vals);
    var maxV = Math.max.apply(null, vals);
    var range = Math.max(1, maxV - minV);
    var pad = range * 0.1;
    minV = Math.max(0, minV - pad);
    maxV = maxV + pad;
    range = maxV - minV;

    var pts = daily.map((d, i) => {
        var x = P + (i / (daily.length - 1)) * (W - 2*P);
        var y = H - P - ((d.followers - minV) / range) * (H - 2*P);
        return { x: x, y: y, d: d };
    });

    var pathD = 'M ' + pts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ');
    var areaD = pathD + ' L ' + pts[pts.length-1].x.toFixed(1) + ',' + (H-P) + ' L ' + pts[0].x.toFixed(1) + ',' + (H-P) + ' Z';

    // Y axis labels
    var ySteps = 4;
    var yLabels = '';
    for (var i = 0; i <= ySteps; i++) {
        var v = minV + (range / ySteps) * i;
        var y = H - P - (i / ySteps) * (H - 2*P);
        yLabels += '<text x="' + (P-8) + '" y="' + (y+4) + '" text-anchor="end" fill="var(--muted)" font-size="11">' + fmtNumShort(Math.round(v)) + '</text>';
        yLabels += '<line x1="' + P + '" x2="' + (W-P) + '" y1="' + y + '" y2="' + y + '" stroke="var(--border)" stroke-width="0.5"/>';
    }
    // X axis labels (only first/middle/last)
    var xLabels = '';
    var idxList = [0, Math.floor(daily.length/4), Math.floor(daily.length/2), Math.floor(daily.length*3/4), daily.length-1];
    idxList.forEach(idx => {
        if (idx >= daily.length) return;
        var p = pts[idx];
        var dt = daily[idx].date;
        var lbl = dt ? dt.substring(5).split('-').reverse().join('/') : '';
        xLabels += '<text x="' + p.x + '" y="' + (H-P+18) + '" text-anchor="middle" fill="var(--muted)" font-size="11">' + lbl + '</text>';
    });

    var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">';
    svg += '<defs><linearGradient id="grdFollowers" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.35"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>';
    svg += yLabels;
    svg += xLabels;
    svg += '<path d="' + areaD + '" fill="url(#grdFollowers)" />';
    svg += '<path d="' + pathD + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    // last point
    var last = pts[pts.length-1];
    svg += '<circle cx="' + last.x + '" cy="' + last.y + '" r="4" fill="var(--accent2)" stroke="var(--accent)" stroke-width="2"/>';
    svg += '<text x="' + last.x + '" y="' + (last.y - 10) + '" text-anchor="middle" fill="var(--accent2)" font-size="12" font-weight="600">' + fmtNum(daily[daily.length-1].followers) + '</text>';
    svg += '</svg>';
    return svg;
}

function renderGoogleDailyChart(daily) {
    if (!daily || daily.length < 2) return '';
    var W = 900, H = 240, P = 50;
    var costs = daily.map(d => d.cost || 0);
    var convs = daily.map(d => d.conversions || 0);
    var maxCost = Math.max(1, Math.max.apply(null, costs));
    var maxConv = Math.max(1, Math.max.apply(null, convs));

    var costPts = daily.map((d, i) => {
        var x = P + (i / (daily.length - 1)) * (W - 2*P);
        var y = H - P - ((d.cost || 0) / maxCost) * (H - 2*P);
        return { x: x, y: y };
    });
    var convPts = daily.map((d, i) => {
        var x = P + (i / (daily.length - 1)) * (W - 2*P);
        var y = H - P - ((d.conversions || 0) / maxConv) * (H - 2*P);
        return { x: x, y: y };
    });

    var costPath = 'M ' + costPts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ');
    var convPath = 'M ' + convPts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ');

    var idxList = [0, Math.floor(daily.length/4), Math.floor(daily.length/2), Math.floor(daily.length*3/4), daily.length-1];
    var xLabels = '';
    idxList.forEach(idx => {
        if (idx >= daily.length) return;
        var p = costPts[idx];
        var dt = daily[idx].date;
        var lbl = dt ? dt.substring(5).split('-').reverse().join('/') : '';
        xLabels += '<text x="' + p.x + '" y="' + (H-P+18) + '" text-anchor="middle" fill="var(--muted)" font-size="11">' + lbl + '</text>';
    });

    var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">';
    // Y axis labels
    for (var i = 0; i <= 4; i++) {
        var v1 = (maxCost / 4) * i;
        var v2 = (maxConv / 4) * i;
        var y = H - P - (i / 4) * (H - 2*P);
        svg += '<text x="' + (P-8) + '" y="' + (y+4) + '" text-anchor="end" fill="var(--accent)" font-size="11">' + fmtBRL(v1) + '</text>';
        svg += '<text x="' + (W-P+8) + '" y="' + (y+4) + '" text-anchor="start" fill="var(--green)" font-size="11">' + Math.round(v2) + '</text>';
        svg += '<line x1="' + P + '" x2="' + (W-P) + '" y1="' + y + '" y2="' + y + '" stroke="var(--border)" stroke-width="0.5"/>';
    }
    svg += xLabels;
    svg += '<path d="' + costPath + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>';
    svg += '<path d="' + convPath + '" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="0"/>';
    // Legenda
    svg += '<g transform="translate(' + (P+10) + ',' + (P-25) + ')">';
    svg += '<rect x="0" y="0" width="14" height="3" fill="var(--accent)"/>';
    svg += '<text x="20" y="6" fill="var(--text)" font-size="12">Investimento (R$)</text>';
    svg += '<rect x="160" y="0" width="14" height="3" fill="var(--green)"/>';
    svg += '<text x="180" y="6" fill="var(--text)" font-size="12">Conversões</text>';
    svg += '</g>';
    svg += '</svg>';
    return svg;
}

function sectionPassos() {
    return '<div class="section-title">💡 Próximos Passos</div><div class="panel"><div class="panel-title">Em construção</div><div class="empty">Recomendações automáticas serão adicionadas na próxima etapa.</div></div>';
}

// === ROUTER ===
var SECTIONS = {
    'resumo': function() { return sectionResumo(); },
    'vendas-all': function() { return sectionBloco('vendas', '💰 Vendas TOEFL', 'vendas'); },
    'ig-organico': function() { return sectionInstagramOrganico(); },
    'engajamento': function() { return sectionEngajamento(); },
    'google': function() { return sectionGoogleAds(); },
    'criativos': function() { return sectionCriativos(); },
    'passos': function() { return sectionPassos(); }
};

function showSection(key) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    var nav = document.querySelector('.nav-item[data-section="' + key + '"]');
    if (nav) nav.classList.add('active');
    var renderer = SECTIONS[key];
    document.getElementById('main-content').innerHTML = renderer ? renderer() : '<div class="empty">Seção não encontrada.</div>';
}

function toYMD(d) {
    return d.getFullYear() + '-' +
           String(d.getMonth()+1).padStart(2,'0') + '-' +
           String(d.getDate()).padStart(2,'0');
}

function init() {
    var ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    document.getElementById('date-end').value = toYMD(ontem);
    if (DAILY_DATA.length > 0) document.getElementById('date-start').value = DAILY_DATA[0].date;

    document.querySelectorAll('.nav-item').forEach(n => {
        n.addEventListener('click', () => showSection(n.dataset.section));
    });

    document.querySelectorAll('.range-btn').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.range-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            var range = b.dataset.range;
            var hj = new Date();
            var on = new Date(); on.setDate(on.getDate() - 1);
            var start, end;
            if (range === 'hoje') { start = hj; end = hj; }
            else if (range === 'ontem') { start = on; end = on; }
            else if (range === 'all') {
                start = DAILY_DATA.length > 0 ? new Date(DAILY_DATA[0].date + 'T00:00:00') : new Date('2026-01-01');
                end = on;
            } else {
                var dias = parseInt(range.replace('d',''));
                end = on; start = new Date(end); start.setDate(start.getDate() - dias + 1);
            }
            document.getElementById('date-start').value = toYMD(start);
            document.getElementById('date-end').value = toYMD(end);
            var active = document.querySelector('.nav-item.active');
            if (active) showSection(active.dataset.section);
        });
    });

    ['date-start','date-end'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
            var active = document.querySelector('.nav-item.active');
            if (active) showSection(active.dataset.section);
        });
    });

    showSection('resumo');
}

document.addEventListener('DOMContentLoaded', init);
</script>
