name: Atualizar BI TOEFL

on:
  schedule:
    # 2x/dia: 08:30 e 20:00 Brasilia (11:30 e 23:00 UTC)
    - cron: '30 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:  # roda manualmente

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar deps
        run: pip install -r requirements.txt

      - name: Rodar atualizacao Meta Ads
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PERIODO_INICIO: '2026-01-01'
        run: python atualizar_bi.py

      - name: Rodar atualizacao Instagram Organico
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PERIODO_INICIO: '2026-01-01'
        run: python atualizar_bi_instagram.py
        continue-on-error: true  # nao falha o job se IG der erro pontual

      - name: Rodar atualizacao Google Ads
        env:
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
          GOOGLE_CLIENT_CUSTOMER_ID: ${{ secrets.GOOGLE_CLIENT_CUSTOMER_ID }}
          PERIODO_INICIO: '2026-01-01'
        run: python atualizar_bi_google.py
        continue-on-error: true

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Sem mudancas no HTML"
          else
            git commit -m "Auto-update BI $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
